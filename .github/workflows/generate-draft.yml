# 3日に1回、朝5時（JST）頃にブログ下書きを自動作成して drafts/ に保存し、stock と log を更新する
name: ブログ下書きを自動作成（3日に1回）

on:
  schedule:
    # 20:00 UTC = 翌朝 5:00 JST。*/3 で月の 1,4,7,10... 日に実行（約3日ごと）
    - cron: '0 20 */3 * *'
  workflow_dispatch:  # 手動実行用（Actions タブから「Run workflow」で試せる）

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # コミット＆プッシュに必要

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存関係をインストール
        run: pip install -r requirements.txt

      - name: 下書きを生成（手動の流れを自動化：Claude で記事作成 → drafts 保存・log/stock 更新）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/generate_draft.py

      - name: 変更をコミットしてプッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts/ used/log.md topics/stock.md
          git diff --staged --quiet || (git commit -m "Auto: ブログ下書き＋画像を追加（3日ごと実行）" && git push)
