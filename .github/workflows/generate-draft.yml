# 3日に1回、朝5時（JST）頃にブログ記事を自動作成してWixに下書き投稿する
name: ブログ記事を自動作成・Wix投稿（3日に1回）

on:
  workflow_dispatch:  # 手動実行のみ

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # コミット＆プッシュに必要

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存関係をインストール
        run: pip install -r requirements.txt

      - name: 記事生成・画像生成・Wix投稿を一括実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
        run: python scripts/run_pipeline.py

      - name: 変更をコミットしてプッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add drafts/ used/log.md topics/stock.md
          git diff --staged --quiet || (git commit -m "Auto: ブログ記事・画像生成・Wix投稿完了" && git push)
